name: Build Android
on:
  workflow_dispatch:
    inputs:
      build_variant:
        description: 'Build Variant'
        required: true
        default: 'debug'
      output_format:
        description: 'Output Format'
        required: true
        default: 'apk'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'
      - name: Build with Gradle
        run: |
          if [ "${{ github.event.inputs.output_format }}" = "aab" ]; then
            if [ "${{ github.event.inputs.build_variant }}" = "release" ]; then
              gradle bundleRelease
            else
              gradle bundleDebug
            fi
          else
            if [ "${{ github.event.inputs.build_variant }}" = "release" ]; then
              gradle assembleRelease
            else
              gradle assembleDebug
            fi
          fi
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-artifact
          path: |
            app/build/outputs/apk/**/*.apk
            app/build/outputs/bundle/**/*.aab
